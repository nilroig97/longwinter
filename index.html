<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>Roba una carta</title>

<style>
body {
    font-family: serif;
    background: #111;
    color: white;
    text-align: center;
    padding-top: 50px;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    background: #7a2cff;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin: 5px;
}

button:hover {
    background: #9b4dff;
}

#game {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 50px;
    margin-top: 50px;
}

#deck-container, #discard-container {
    display: flex;
    flex-direction: column;
    align-items: center;
}

#deck img, #discard img {
    max-width: 150px;
    border-radius: 10px;
    box-shadow: 0 0 20px black;
    cursor: pointer;
    transition: transform 0.3s;
}

#discard img {
    max-width: 100px;
}

#current-card {
    min-width: 350px;
}

#current-card img {
    max-width: 380px;
    display: block;
    margin: auto;
    border-radius: 14px;
    box-shadow: 0 0 30px black;
    transition: transform 0.8s;
    backface-visibility: hidden;
}

.card-flip {
    transform: rotateY(180deg);
}

h3 {
    margin-bottom: 10px;
}

/* preview flotant */

#hover-preview {
    position: fixed;
    pointer-events: none;
    display: none;
    z-index: 1000;
}

#hover-preview img {
    width: 260px;
    border-radius: 12px;
    box-shadow: 0 0 25px black;
}
</style>
</head>

<body>

<h1>Roba una carta</h1>

<div>
<button onclick="drawCard()">Roba una carta</button>
<button onclick="shuffleDeck()">Barreja totes les cartes</button>
</div>

<div id="game">

<div id="deck-container">
<h3>Baralla</h3>
<div id="deck"></div>
</div>

<div id="current-card"></div>

<div id="discard-container">
<h3>Descarte</h3>
<div id="discard"></div>
</div>

</div>

<div id="hover-preview">
<img src="">
</div>

<script>

// ----------------------
// CONFIGURA LES CARTES
// ----------------------

let cardList = [
"cartes/21-min.png",
"cartes/23-min.png",
"cartes/24-min.png",
"cartes/25-min.png",
"cartes/26-min.png",
"cartes/27-min.png",
"cartes/28-min.png",
"cartes/29-min.png",
"cartes/30-min.png",
"cartes/31-min.png",
"cartes/32-min.png",
"cartes/33-min.png",
"cartes/34-min.png",
"cartes/35-min.png",
"cartes/36-min.png",
"cartes/37-min.png",
"cartes/38-min.png",
"cartes/39-min.png",
"cartes/40-min.png",
"cartes/41-min.png",
"cartes/42-min.png",
"cartes/43-min.png",
"cartes/44-min.png",
"cartes/45-min.png",
"cartes/46-min.png",
"cartes/47-min.png",
"cartes/48-min.png",
"cartes/49-min.png",
"cartes/50-min.png",
"cartes/51-min.png",
"cartes/52-min.png",
"cartes/53-min.png",
"cartes/54-min.png",
"cartes/55-min.png",
"cartes/56-min.png",
"cartes/57-min.png",
"cartes/58-min.png",
"cartes/59-min.png",
"cartes/60-min.png",
"cartes/61-min.png",
"cartes/62-min.png",
"cartes/63-min.png",
"cartes/64-min.png",
"cartes/65-min.png",
"cartes/66-min.png",
"cartes/67-min.png",
"cartes/68-min.png",
"cartes/69-min.png",
"cartes/70-min.png",
"cartes/71-min.png",
"cartes/72-min.png",
"cartes/73-min.png",
"cartes/74-min.png",
"cartes/75-min.png",
"cartes/76-min.png",
"cartes/77-min.png",
"cartes/78-min.png"
];

let backImage = "cartes/back.png";

// ----------------------

let deck = [...cardList];
let discardPile = [];
let currentCard = null;

let deckDiv = document.getElementById("deck");
let discardDiv = document.getElementById("discard");
let currentCardDiv = document.getElementById("current-card");

// ----------------------
// BARALLA
// ----------------------

function renderDeck() {

deckDiv.innerHTML = "";

if(deck.length > 0){

let topCard = document.createElement("img");
topCard.src = backImage;

deckDiv.appendChild(topCard);

}

}

// ----------------------
// DESCARTES
// ----------------------

function renderDiscard() {

discardDiv.innerHTML = "";

discardPile.forEach(c => {

let img = document.createElement("img");
img.src = c;

img.addEventListener("mouseenter", () => {

let preview = document.getElementById("hover-preview");

preview.style.display = "block";
preview.querySelector("img").src = c;

});

img.addEventListener("mousemove", e => {

let preview = document.getElementById("hover-preview");

preview.style.left = (e.clientX + 20) + "px";
preview.style.top = (e.clientY + 20) + "px";

});

img.addEventListener("mouseleave", () => {

let preview = document.getElementById("hover-preview");

preview.style.display = "none";

});

discardDiv.appendChild(img);

});

}

// ----------------------
// ROBAR CARTA
// ----------------------

function drawCard() {

if(deck.length === 0){
alert("S'han acabat les cartes! Prem 'Barreja totes les cartes' per començar de nou.");
return;
}

// si ja hi ha carta al centre → va a descartes
if(currentCard !== null){
discardPile.push(currentCard);
renderDiscard();
}

let randomIndex = Math.floor(Math.random() * deck.length);
let card = deck.splice(randomIndex,1)[0];

currentCard = card;

// mostrar revers
currentCardDiv.innerHTML = `<img src="${backImage}" id="flip-card">`;

let flipCard = document.getElementById("flip-card");

// animació flip
setTimeout(() => {

flipCard.classList.add("card-flip");
flipCard.src = card;

},100);

renderDeck();

}

// ----------------------
// BARREJAR
// ----------------------

function shuffleDeck() {

deck = deck.concat(discardPile);
discardPile = [];

for (let i = deck.length - 1; i > 0; i--) {

const j = Math.floor(Math.random() * (i + 1));

[deck[i], deck[j]] = [deck[j], deck[i]];

}

renderDeck();
renderDiscard();

alert("Les cartes han estat barrejades de nou!");

}

// ----------------------

renderDeck();
renderDiscard();

</script>

</body>
</html>
